name: API CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

defaults:
  run:
    working-directory: api

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector-enabled image, required since migration 0004 (RAG
        # knowledge base) runs `CREATE EXTENSION vector` -- plain
        # postgres:16-alpine doesn't ship that extension and `alembic
        # upgrade head` fails on it. Matches docker-compose.yml's image.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: finos
          POSTGRES_PASSWORD: finos_dev_password
          POSTGRES_DB: finos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U finos -d finos_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://finos:finos_dev_password@localhost:5432/finos_test
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET: ci-test-secret-not-for-production-use-only-32bytes-min

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Verify migrations apply cleanly
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing
